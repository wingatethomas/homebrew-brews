name: CI

on:
  pull_request:
    paths:
      - "Casks/**"

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate cask syntax
        run: |
          ruby -c Casks/claudewatch.rb

      - name: Verify download URL and checksum
        run: |
          VERSION=$(grep 'version "' Casks/claudewatch.rb | head -1 | sed 's/.*version "//;s/"//')
          SHA256=$(grep 'sha256 "' Casks/claudewatch.rb | head -1 | sed 's/.*sha256 "//;s/"//')
          URL="https://github.com/wingatethomas/claudewatch/releases/download/v${VERSION}/ClaudeWatch-v${VERSION}-arm64.zip"
          echo "Checking ${URL}"
          curl -fsSL -o /tmp/claudewatch.zip "$URL"
          ACTUAL=$(shasum -a 256 /tmp/claudewatch.zip | awk '{print $1}')
          if [ "$ACTUAL" != "$SHA256" ]; then
            echo "CHECKSUM MISMATCH: expected ${SHA256}, got ${ACTUAL}"
            exit 1
          fi
          echo "Checksum verified: ${SHA256}"
